<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ScanFix AI</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #050816, #0a1630);
      color: white;
      text-align: center;
      padding: 60px 20px;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
    }

    p {
      font-size: 1.2rem;
      max-width: 700px;
      margin: 0 auto 20px;
      line-height: 1.6;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 14px 28px;
      background: #00bfff;
      color: white;
      text-decoration: none;
      border-radius: 10px;
      font-weight: bold;
    }

    .btn:hover {
      background: #0099cc;
    }
  </style>
</head>
<body>
  <h1>ScanFix AI</h1>
  <p>Creado por manos puertorriqueñas.</p>
  <p>
    Nuestro objetivo es que toda persona pueda llegar a un entendimiento fácil
    del diagnóstico de su vehículo.
  </p>
  <a class="btn" href="#">Próximamente</a>

</html>
